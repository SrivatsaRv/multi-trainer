# ============================================================
# Production Compose -- Image-ref based, no build blocks.
# Tags are updated automatically by `make tag-compose` via yq
# after a successful CI build.
# ============================================================
services:
  backend:
    image: ${REGISTRY:-ttl.sh}/multi-trainer-backend:${IMAGE_TAG:-latest}
    container_name: gym-saas-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${REGISTRY:-ttl.sh}/multi-trainer-frontend:${IMAGE_TAG:-latest}
    container_name: gym-saas-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - BACKEND_INTERNAL_URL=http://backend:8000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    container_name: gym-saas-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-gym_saas}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gym_saas}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
