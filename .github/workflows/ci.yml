name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  # Read from ci.env at runtime via make; these are fallbacks for
  # steps that need values before make runs.
  COMPOSE_DOCKER_CLI_BUILD: 1
  DOCKER_BUILDKIT: 1

jobs:
  # ============================================================
  # Stage 1: Quality Gates (run in parallel)
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend lint tools
        run: pip install flake8

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Lint backend
        run: flake8 app/
        working-directory: backend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gym_saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Run unit tests
        run: pytest tests -m "not integration" --tb=short -q
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/gym_saas_test
          SECRET_KEY: ci-test-secret-key
          PYTHONPATH: .

      - name: Run integration tests
        run: pytest tests -m "integration" --tb=short -q
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/gym_saas_test
          SECRET_KEY: ci-test-secret-key
          PYTHONPATH: .

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm run test -- --run
        working-directory: frontend

  # ============================================================
  # Stage 2: Build & Push (depends on all quality gates)
  # ============================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    # Only build on push to main or on tags, not on PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Registry login (only needed for ECR/DockerHub/GHCR, skipped for ttl.sh)
      - name: Login to registry
        if: env.REGISTRY_USER != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}

      - name: Build images
        run: make build

      - name: Push images
        run: make push

  # ============================================================
  # Stage 3: Tag Propagation (update compose after push)
  # ============================================================
  update-compose-tags:
    name: Update Compose Tags
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update tags in docker-compose.prod.yml
        run: make tag-compose

      - name: Commit updated compose
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.prod.yml
          git diff --cached --quiet || git commit -m "ci: update image tags to $(cat VERSION)-$(git rev-parse --short HEAD)"
          git pull --rebase origin main
          git push
